name: Quality Gate (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22.20.0"
      pnpm-version:
        type: string
        default: "10.27.0"
      run-e2e:
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/contracts/**'
              - 'packages/auth/**'
              - 'packages/db/**'
              - 'packages/e2e-web/**'

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ inputs.pnpm-version }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format
      - name: Unit tests + coverage
        run: pnpm turbo test:cov --continue
      - name: Coverage summary on PR (web)
        if: github.event_name == 'pull_request' && always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: web
          json-summary-path: apps/web/coverage/coverage-summary.json
          json-final-path: apps/web/coverage/coverage-final.json
      - name: Coverage summary on PR (contracts)
        if: github.event_name == 'pull_request' && always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: contracts
          json-summary-path: packages/contracts/coverage/coverage-summary.json
          json-final-path: packages/contracts/coverage/coverage-final.json

  e2e:
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || inputs.run-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ inputs.pnpm-version }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @repo/e2e-web exec playwright install --with-deps chromium
      - name: Run E2E (critical journeys)
        run: pnpm test:e2e:web
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e-web/playwright-report/
          retention-days: 7

  quality-gate:
    if: always()
    needs: [verify, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          echo "verify: ${{ needs.verify.result }}"
          echo "e2e:    ${{ needs.e2e.result }}"
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "::error::Static checks / unit tests failed."; exit 1
          fi
          if [ "${{ needs.e2e.result }}" = "failure" ] || [ "${{ needs.e2e.result }}" = "cancelled" ]; then
            echo "::error::E2E critical-journey tests failed."; exit 1
          fi
          echo "Quality gate passed."